<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Resolve ppv.to live stream URLs to playable HLS m3u8 links.">
  <title>PPV Stream Resolver</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.20/dist/hls.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #6366f1;
      --accent-glow: rgba(99, 102, 241, 0.5);
      --accent-hover: #4f46e5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, #18181b 0%, transparent 70%);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      width: min(1000px, 100%);
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-rows: auto auto minmax(400px, 1fr) auto;
      gap: 24px;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(to right, #fff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .subtitle a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .subtitle a:hover {
      color: #818cf8;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      background: var(--surface);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    #url {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    #url::placeholder {
      color: #52525b;
    }

    #url:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #resolve {
      padding: 12px 28px;
      border: 0;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px var(--accent-glow);
    }

    #resolve:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    #resolve:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      background: var(--border);
    }

    .stage {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #000;
      overflow: hidden;
      min-height: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    /* Subtle glow around the player */
    .stage::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), transparent 40%);
      z-index: 0;
      border-radius: 16px;
      pointer-events: none;
    }

    #player {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      min-height: 400px;
      object-fit: contain;
      background: #000;
    }

    .foot {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    #state {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #state::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .output {
      display: none;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .output.visible {
      display: flex;
    }

    #hlsUrl {
      flex: 1;
      min-width: 0;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      cursor: text;
    }

    #hlsUrl:focus {
      outline: none;
      border-color: var(--border-hover);
    }

    #copy {
      padding: 10px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #copy:hover {
      background: var(--border);
      color: #fff;
    }

    @media (max-width: 600px) {
      .toolbar {
        flex-direction: column;
      }
      .output {
        flex-direction: column;
      }
      .layout {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header>
      <h1 class="title">Stream Extractor</h1>
      <p class="subtitle">Resolve and play live streams from <a href="https://ppv.to" target="_blank" rel="noopener noreferrer">ppv.to</a></p>
    </header>

    <div class="toolbar">
      <input id="url" type="text" inputmode="url" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="https://ppv.to/live/…">
      <button id="resolve" type="button">Extract</button>
    </div>

    <div class="stage">
      <video id="player" controls playsinline></video>
    </div>

    <div class="foot">
      <div id="state">Ready</div>
      <div class="output" id="output">
        <input id="hlsUrl" type="text" readonly tabindex="-1">
        <button id="copy" type="button">Copy URL</button>
      </div>
    </div>
  </div>

  <script type="module">
    const urlInput = document.getElementById('url')
    const resolveBtn = document.getElementById('resolve')
    const player = document.getElementById('player')
    const state = document.getElementById('state')
    const output = document.getElementById('output')
    const hlsUrl = document.getElementById('hlsUrl')
    const copyBtn = document.getElementById('copy')

    let hls = null

    function setState(message) {
      state.textContent = message
    }

    function clearOutput() {
      output.classList.remove('visible')
      hlsUrl.value = ''
    }

    function showOutput(value) {
      hlsUrl.value = value
      output.classList.add('visible')
    }

    function stopPlayback() {
      if (hls) {
        hls.destroy()
        hls = null
      }
      player.pause()
      player.removeAttribute('src')
      player.load()
    }

    async function requestResolve(streamUrl) {
      const controller = new AbortController()
      const timeout = setTimeout(() => controller.abort(), 60000)
      try {
        const response = await fetch('/api/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: streamUrl }),
          signal: controller.signal,
        })
        const type = response.headers.get('content-type') || ''
        if (!type.includes('application/json')) {
          throw new Error(`Unexpected response ${response.status}`)
        }
        return await response.json()
      } finally {
        clearTimeout(timeout)
      }
    }

    function startPlayback(source, label) {
      stopPlayback()
      setState(label)

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: true,
          liveDurationInfinity: true,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 6,
          maxLiveSyncPlaybackRate: 1,
          backBufferLength: 60,
          startPosition: -1,
          fragLoadingTimeOut: 60000,
          manifestLoadingTimeOut: 30000,
          levelLoadingTimeOut: 30000,
        })
        hls.on(Hls.Events.ERROR, (_, data) => {
          if (!data.fatal) return
          setState(`${data.type}: ${data.details}`)
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad()
        })
        hls.attachMedia(player)
        hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(() => {}))
        hls.loadSource(source)
        return
      }

      if (player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = source
        player.play().catch(() => {})
      }
    }

    async function runResolve() {
      const streamUrl = urlInput.value.trim()
      if (!streamUrl) {
        setState('Paste a ppv.to URL first.')
        urlInput.focus()
        return
      }

      resolveBtn.disabled = true
      clearOutput()
      stopPlayback()
      setState('Resolving…')

      try {
        const result = await requestResolve(streamUrl)
        if (!result.ok) {
          setState(`${result.stage || 'error'}: ${result.error || 'failed'}`)
          return
        }
        if (!result.proxiedUrl) {
          throw new Error('Missing proxied URL')
        }
        showOutput(result.proxiedUrl)
        startPlayback(result.proxiedUrl, result.contentPath || 'Playing')
      } catch (error) {
        stopPlayback()
        setState(error.name === 'AbortError' ? 'Request timed out' : String(error.message || error))
      } finally {
        resolveBtn.disabled = false
        urlInput.focus()
      }
    }

    resolveBtn.addEventListener('click', runResolve)

    urlInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault()
        runResolve()
      }
    })

    copyBtn.addEventListener('click', async () => {
      if (!hlsUrl.value) return
      await navigator.clipboard.writeText(hlsUrl.value)
      
      // Visual feedback on copy
      const originalText = copyBtn.textContent
      copyBtn.textContent = 'Copied!'
      copyBtn.style.color = 'var(--success)'
      copyBtn.style.borderColor = 'var(--success)'
      
      setState('Proxied URL copied to clipboard')
      
      setTimeout(() => {
        copyBtn.textContent = originalText
        copyBtn.style.color = ''
        copyBtn.style.borderColor = ''
      }, 2000)
    })

    urlInput.focus()
  </script>
</body>
</html>
